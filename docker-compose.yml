services:
    dss:
        image: ghcr.io/authentin/dss:latest
        ports:
            - '8080:8080'
        healthcheck:
            test: ['CMD-SHELL', 'wget -q --spider http://localhost:8080/services/rest/server-signing/keys || exit 1']
            interval: 10s
            timeout: 5s
            retries: 30
            start_period: 60s
