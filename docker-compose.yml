services:
    dss:
        image: ghcr.io/authentin/dss:latest
        ports:
            - '8080:8080'
        healthcheck:
            test: ['CMD-SHELL', 'bash -c "exec 3<>/dev/tcp/localhost/8080 && echo -e \"GET /services/ HTTP/1.0\r\nHost: localhost\r\n\r\n\" >&3 && grep -q 200 <&3"']
            interval: 10s
            timeout: 5s
            retries: 30
            start_period: 60s
