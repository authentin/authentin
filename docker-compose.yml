services:
    dss:
        build:
            context: https://github.com/esig/dss-demonstrations.git#master
        ports:
            - '8080:8080'
        healthcheck:
            test: ['CMD-SHELL', 'wget -q --spider http://localhost:8080/services/rest/server-signing/keys || exit 1']
            interval: 10s
            timeout: 5s
            retries: 30
            start_period: 60s
