name: Subtree Split

on:
  push:
    branches: [main]
    tags: ['*']

jobs:
  split:
    name: Split ${{ matrix.package.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: eusig
            directory: packages/eusig
            repository: eusig
          - name: eusig-bundle
            directory: packages/eusig-bundle
            repository: eusig-bundle

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ matrix.package.repository }}

      - name: Install splitsh-lite
        run: |
          curl -sL https://github.com/splitsh/lite/releases/download/v1.0.1/lite_linux_amd64.tar.gz | tar xz
          chmod +x splitsh-lite
          sudo mv splitsh-lite /usr/local/bin/

      - name: Split and push branch
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          SHA=$(splitsh-lite --prefix=${{ matrix.package.directory }})
          git push -f "https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/authentin/${{ matrix.package.repository }}.git" "$SHA:refs/heads/main"

      - name: Split and push tag
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          SHA=$(splitsh-lite --prefix=${{ matrix.package.directory }})
          REMOTE="https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/authentin/${{ matrix.package.repository }}.git"
          git push -f "$REMOTE" "$SHA:refs/heads/main"
          git tag -f "${{ github.ref_name }}" "$SHA"
          git push -f "$REMOTE" "refs/tags/${{ github.ref_name }}"
